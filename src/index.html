<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <meta name="description" content="Whatsapp API Powered By CSA Computer" />
  <title>Whatsapp API Powered by CSA Computer</title>

  <link rel="stylesheet" href="styles/bootstrap.min.css" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/titlebar.css" />
</head>

<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <img src="images/icon.ico" class="app-icon" />
      <span class="app-title">WACSA</span>
      <span id="app-version" class="ms-2 small opacity-75"></span>
    </div>
    <div class="titlebar-right">
      <button id="btn-minimize" class="tb-btn">–</button>
      <button id="btn-close" class="tb-btn close">×</button>
    </div>
  </div>

  <!-- Modal konfirmasi keluar -->
  <div id="modal-confirm-exit" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:99999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:8px;padding:24px;width:340px;max-width:90%;box-shadow:0 4px 24px rgba(0,0,0,0.2);">
      <h6 style="margin:0 0 12px;font-size:1rem;font-weight:600;">Keluar dari WACSA?</h6>
      <p style="margin:0 0 20px;font-size:0.875rem;color:#555;line-height:1.5;">Dengan mengakhiri program ini, maka semua layanan pengiriman pesan akan dihentikan.</p>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="btn-exit-cancel" style="padding:6px 16px;border:1px solid #ccc;background:#fff;border-radius:4px;cursor:pointer;font-size:0.875rem;">Batal</button>
        <button id="btn-exit-confirm" style="padding:6px 16px;border:none;background:#dc3545;color:#fff;border-radius:4px;cursor:pointer;font-size:0.875rem;">Ya, Keluar</button>
      </div>
    </div>
  </div>

  <header></header>
  <main></main>

  <script src="scripts/bootstrap.bundle.min.js"></script>
  <script src="renderer/index.js"></script>
</body>

</html>
